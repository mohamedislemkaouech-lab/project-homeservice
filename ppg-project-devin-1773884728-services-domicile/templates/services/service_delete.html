{% extends 'base.html' %}

{% block title %}Supprimer {{ service.title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">
                <div class="card-body text-center p-4">
                    <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                    <h4>Supprimer ce service ?</h4>
                    <p class="text-muted">Êtes-vous sûr de vouloir supprimer <strong>{{ service.title }}</strong> ? Cette action est irréversible.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2"><i class="fas fa-trash me-1"></i>Supprimer</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Annuler</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
